  output-dir: _site

website:
  title: "Unmasking the Leak"
  navbar:
    background: primary
    left:
      - text: "{{< fa house >}} Home"   # ← Add this to explicitly map to index.qmd
        href: index.qmd
      - text: "{{< fa file-lines >}} Proposal"
        href: proposal.qmd
      - text: "Methodology"
        menu:
          - text: "{{< fa database >}} Data Preparation"
            href: methodology/data_preparation/data_preparation.qmd
          - text: "{{< fa chart-bar >}} Data Exploration and Visualization"
            href: methodology/data_exploration/data_exploration.qmd
      - text: "{{< fa magnifying-glass >}} Findings"
        href: findings.qmd
      - text: "{{< fa image >}} Poster"
        href: poster.qmd
      - text: "{{< fa clipboard >}} Meeting Minutes"
        href: meeting_minutes.qmd
    right:
      - text: "{{< fa users >}} The Team"
        href: about.qmd
      - text: "Shiny App"
        menu:
          - text: "{{< fa book >}} User Guide"
            href: user_guide.qmd
          - text: "{{< fa rocket >}} Shiny App"
            href: "https://isss608amk.shinyapps.io/isss608-final-project-ajp/"
      - text: "Github"
        menu:
          - text: "{{< fa code >}} Project Site"
            href: "https://github.com/levitus1990/isss608_final_project_ajp"
          - text: "{{< fa brands github >}} Shiny App"
            href: "https://github.com/levitus1990/isss608_final_project_ajp"

format:
  html:
    theme: [cosmo, custom.scss]   # ← loads your custom cyan theme on top of cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: true
    code-tools: true
    code-overflow: wrap
filters:                          # ← enables the Font Awesome shortcode extension
  - fontawesome